spring.application.name=hotel-booking
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=HotelDB;encrypt=false
spring.datasource.username=sa
spring.datasource.password=123

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-gmail-username@gmail.com
spring.mail.password=your-gmail-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

cloudinary.cloud-name=your-cloudinary-cloud-name
cloudinary.api-key=your-cloudinary-api-key
cloudinary.api-secret=your-cloudinary-api-secret
# Giới hạn upload file (Spring Boot 3.x)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

server.servlet.context-path=/api

google.client_id=your-google-client-id
google.client_secret=your-google-client-secret

vnpay.tmnCode=your-vnpay-tmn-code
vnpay.hashSecret=your-vnpay-hash-secret
vnpay.payUrl=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.returnUrl=your-vnpay-return-url


vnpay.version=2.1.0
vnpay.command=pay
vnpay.currCode=VND
vnpay.locale=vn

